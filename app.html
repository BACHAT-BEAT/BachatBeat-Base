<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="BachatBeat — Financial pulse analytics for Indian financial professionals. Identify trapped capital across insurance, FDs, mutual funds, and loans."/>
  <title>BachatBeat — Financial Pulse Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Barlow+Condensed:ital,wght@0,500;0,700;0,800;0,900;1,700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/dark-theme.css"/>
  <style>
    /* ── Onboarding-specific styles ─────────────────────── */
    .onboard-card {
      background: var(--color-white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 40px 44px;
      width: 100%;
      max-width: 520px;
    }
    .onboard-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .onboard-logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--color-emerald), var(--color-teal));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .onboard-logo-icon svg {
      width: 22px; height: 22px;
    }
    .onboard-brand {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--color-emerald);
      letter-spacing: -0.02em;
    }
    .onboard-tagline {
      font-size: 0.72rem;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .onboard-pulse-line {
      margin: 12px 0 20px;
      opacity: 0.7;
    }
    .onboard-hero {
      margin-bottom: 28px;
    }
    .onboard-title {
      font-size: 1.65rem;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 10px;
      letter-spacing: -0.03em;
    }
    .onboard-subtitle {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      line-height: 1.6;
    }
    .onboard-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .role-preview {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--color-green-light);
      border: 1px solid var(--color-emerald);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      animation: fade-up 0.25s ease forwards;
    }
    .role-preview-icon {
      color: var(--color-emerald);
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .role-preview-text {
      font-size: 0.82rem;
      color: var(--color-text);
      line-height: 1.5;
    }
    .onboard-note {
      font-size: 0.75rem;
      color: var(--color-text-faint);
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }
    @media (max-width: 480px) {
      .onboard-card { padding: 24px 20px; }
      .onboard-title { font-size: 1.3rem; }
    }

    /* ── Dashboard-specific ──────────────────────────────── */
    .attention-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border-faint);
      cursor: pointer;
      transition: background var(--transition-fast);
      border-radius: var(--radius-sm);
      padding-left: 4px;
    }
    .attention-row:last-child { border-bottom: none; }
    .attention-row:hover { background: var(--color-sage); }
    .attention-info { flex: 1; }
    .attention-name { font-weight: 700; font-size: 0.9rem; }
    .attention-reason { font-size: 0.8rem; color: var(--color-text-muted); margin-top: 2px; }

    /* ── Client avatar ───────────────────────────────────── */
    .client-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-emerald), var(--color-teal));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .profile-avatar-lg {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--color-emerald), var(--color-teal));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    /* ── Nav role emphasis ───────────────────────────────── */
    .nav-item.role-emphasis {
      background: rgba(29,158,117,0.15);
    }
    .nav-item.role-emphasis .nav-item-label { color: white; }

    /* ── Screen content area ─────────────────────────────── */
    #screen-content { min-height: calc(100vh - var(--topbar-h)); }
  </style>
</head>
<body>

<!-- ─── Onboarding Overlay ───────────────────────────────── -->
<div id="onboarding-overlay" style="display:none;">
  <div id="onboarding-content"></div>
</div>

<!-- ─── App Shell ─────────────────────────────────────────── -->
<div id="app-shell" style="display:none;">

  <!-- Sidebar -->
  <nav id="sidebar" role="navigation" aria-label="Main navigation">
    <a href="landing.html" class="sidebar-logo" title="Back to Home" style="text-decoration:none">
      <div class="sidebar-logo-icon" aria-hidden="true" style="overflow:hidden;padding:0;border-radius:10px">
        <img src="logo.jpg" alt="BachatBeat" style="width:100%;height:100%;object-fit:cover;display:block"/>
      </div>
      <div class="sidebar-logo-text">
        <div class="sidebar-logo-name" style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-0.03em;color:#fff;">BachatBeat</div>
        <div class="sidebar-logo-tagline">Financial Pulse</div>
      </div>
    </a>

    <div class="sidebar-nav">
      <!-- Main -->
      <div class="nav-group">
        <div class="nav-group-label">Main</div>
        <div class="nav-item" id="nav-dashboard" data-screen="dashboard" onclick="App.navigate('dashboard')" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </div>
          <div class="nav-item-label">Dashboard</div>
        </div>
        <div class="nav-item" id="nav-clients" data-screen="clients" onclick="App.navigate('clients')" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="nav-item-label">All Clients</div>
        </div>
      </div>

      <!-- Analysis Tools -->
      <div class="nav-group">
        <div class="nav-group-label">Analysis Tools</div>
        <div class="nav-item" id="nav-insurance" data-screen="policy_add" onclick="App.navigate('policy_add',{clientId:'c01'})" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div class="nav-item-label" data-nav-label="portfolio">Portfolio Review</div>
        </div>
        <div class="nav-item" data-screen="fd" onclick="App.navigate('fd',{clientId:'c01'})" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          </div>
          <div class="nav-item-label">FD Analysis</div>
        </div>
        <div class="nav-item" id="nav-mf" data-screen="mf" onclick="App.navigate('mf',{clientId:'c05'})" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div class="nav-item-label" data-nav-label="mf">Investments</div>
        </div>
        <div class="nav-item" data-screen="loans" onclick="App.navigate('loans',{clientId:'c01'})" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          </div>
          <div class="nav-item-label">Loan Analysis</div>
        </div>
        <div class="nav-item" id="nav-tax" data-screen="tax" onclick="App.navigate('tax',{clientId:'c01'})" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <div class="nav-item-label" data-nav-label="tax">Tax Snapshot</div>
        </div>
      </div>

      <!-- Monitoring -->
      <div class="nav-group">
        <div class="nav-group-label">Monitoring</div>
        <div class="nav-item" id="nav-alerts" data-screen="alerts" onclick="App.navigate('alerts')" tabindex="0" role="button">
          <div class="nav-item-icon">
            <svg viewBox="0 0 24 24"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>
          </div>
          <div class="nav-item-label">Alerts Feed</div>
          <div class="nav-badge">4</div>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
  </nav>

  <!-- Topbar -->
  <header id="topbar" role="banner">
    <!-- Pulse line at bottom of topbar -->
    <div id="topbar-pulse" aria-hidden="true"></div>

    <div class="topbar-search">
      <span class="topbar-search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="topbar-search" placeholder="Search clients, policies…" aria-label="Search"/>
    </div>

    <div class="topbar-spacer"></div>
    <div id="topbar-date" class="topbar-date"></div>
    <div class="topbar-role-badge" id="topbar-role-badge">RIA</div>

    <div class="topbar-profile" id="topbar-profile" role="button" tabindex="0" aria-label="Profile menu" aria-haspopup="true">
      <div class="topbar-avatar" id="profile-avatar" style="background:none;overflow:hidden;border:1.5px solid var(--color-teal)">
        <img src="founder.jpg" alt="Profile" style="width:100%;height:100%;object-fit:cover;display:block"/>
      </div>
      <div class="topbar-profile-info">
        <div class="topbar-profile-name" id="profile-name">Aryan Patel</div>
        <div class="topbar-profile-role" id="profile-role">Founder</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"/>
      </svg>

      <div class="topbar-profile-dropdown" id="profile-dropdown" role="menu">
        <div class="dropdown-item" onclick="App.navigate('clients')">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          My Clients
        </div>
        <div class="dropdown-item" onclick="App.navigate('alerts')">
          <svg viewBox="0 0 24 24"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/></svg>
          Alerts &amp; Reminders
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" id="change-role-btn">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Change Role / Firm
        </div>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main id="main-content" role="main">
    <div id="screen-content"></div>
  </main>

  <!-- Mobile bottom nav -->
  <nav id="mobile-nav" aria-label="Mobile navigation">
    <div class="mobile-nav-items">
      <div class="mobile-nav-item active" data-screen="dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Home
      </div>
      <div class="mobile-nav-item" data-screen="clients">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Clients
      </div>
      <div class="mobile-nav-item" data-screen="alerts">
        <svg viewBox="0 0 24 24"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/></svg>
        Alerts
      </div>
      <div class="mobile-nav-item" data-screen="tax">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
        Tax
      </div>
    </div>
  </nav>
</div>

<!-- ─── Scripts ───────────────────────────────────────────── -->
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/screens/onboarding.js"></script>
<script src="js/screens/dashboard.js"></script>
<script src="js/screens/clients.js"></script>
<script src="js/screens/profile.js"></script>
<script src="js/screens/policy.js"></script>
<script src="js/screens/fd_loan_mf.js"></script>
<script src="js/screens/tax_alerts_report.js"></script>
<script>
  // Keyboard nav for sidebar items
  document.querySelectorAll('.nav-item[role="button"]').forEach(el => {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
    });
  });

  // Mock Authentication: update name from localStorage
  const storedUser = localStorage.getItem('bb_user');
  if(storedUser) {
    document.getElementById('profile-name').textContent = storedUser;
    // Keep 'Founder' as role or change it based on logic, leaving as is for now
  }

  // Init app
  window.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
